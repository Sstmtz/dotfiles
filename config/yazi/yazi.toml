[manager]
ratio = [1, 3, 4]      # 布局 1/8(左) 4/8(中) 3/8(右)
sort_by = "natural"    # 文件排序方式
sort_sensitive = false # 不区分大小写
sort_reverse = false   # 正序
sort_dir_first = true  # 目录在前
linemode = "none"      # 行模式: 在文件列表行右侧显示与文件关联的信息。
show_hidden = true     # 显示隐藏文件
show_symlink = true    # 显示链接文件

[preview]
tab_size = 2                    # 制表符宽度
max_width = 600                 # 图像的最大预览宽度
max_height = 900                # 图像的最大预览高度
cache_dir = ""                  # 缓存路径, 默认是系统路径
image_filter = "triangle"       # 图像缩小时使用的过滤器
image_quality = 75              # 预缓存图像的质量，范围为 50-90。
sixel_fraction = 15

# more details: https://yazi-rs.github.io/docs/configuration/yazi/#preview.ueberzug_scale
ueberzug_scale = 1                # Ueberzug 图像缩放比例
ueberzug_offset = [75, 25, 0, 0]  # Ueberzug 图像偏移

[opener]
edit = [
	{ run = 'nvim "$@"', block = true, for = "unix" },
]
play = [
	{ run = 'vlc "$@"', orphan = true, for = "unix" },
]
open = [
	{ run = 'xdg-open "$@"', desc = "Open", for = "unix" },
]
extract = [
  { run = 'ouch d -y "$@"', desc = "Extract here with ouch", for = "unix" }
]

[open]
rules = [
	{ mime = "text/*", use = "edit" },
	{ mime = "video/*", use = "play" },

	# { mime = "application/json", use = "edit" },
	{ name = "*.json", use = "edit" },
	# Multiple openers for a single rule
	{ name = "*.html", use = [ "open", "edit" ] },

]

[tasks]
micro_workers = 10       # 最大并发微任务数。
macro_workers = 25       # 最大并发宏任务数
bizarre_retry = 5        # 发生异常故障时的最大重试次数
image_alloc = 536870912  # 解码单个图像的最大内存分配限制(单位为字节)
image_bound = [0, 0]     # 最大图像大小[width, height]
suppress_preload = false

[plugin]
prepend_previewers = [
  { name = "*.md", run = "glow" },
  { mime = "text/csv", run = "miller"},
  { name = "*/", run = "eza-preview" },

  # Archive previewer
	{ mime = "application/*zip",            run = "ouch" },
	{ mime = "application/x-tar",           run = "ouch" },
	{ mime = "application/x-bzip2",         run = "ouch" },
	{ mime = "application/x-7z-compressed", run = "ouch" },
	{ mime = "application/x-rar",           run = "ouch" },
	{ mime = "application/x-xz",            run = "ouch" },

]

[input]
# cd
cd_title = "Change directory:"
cd_origin = "top-center"
cd_offset = [0, 2, 50, 3]

# create
create_title = "Create:"
create_origin = "top-center"
create_offset = [0, 2, 50, 3]

# rename
rename_title = "Rename:"
rename_origin = "hovered"
rename_offset = [0, 1, 50, 3]

# trash
trash_title = "Move {n} selected file{s} to trash? (y/N)"
trash_origin = "top-center"
trash_offset = [0, 2, 50, 3]

# delete
delete_title = "Delete {n} selected file{s} permanently? (y/N)"
delete_origin = "top-center"
delete_offset = [0, 2, 50, 3]

# filter
filter_title = "Filter:"
filter_origin = "top-center"
filter_offset = [0, 2, 50, 3]

# find
find_title = ["Find next:", "Find previous:"]
find_origin = "top-center"
find_offset = [0, 2, 50, 3]

# search
search_title = "Search via {n}:"
search_origin = "top-center"
search_offset = [0, 2, 50, 3]

# shell
shell_title = ["Shell:", "Shell (block):"]
shell_origin = "top-center"
shell_offset = [0, 2, 50, 3]

# overwrite
overwrite_title = "Overwrite an existing file? (y/N)"
overwrite_origin = "top-center"
overwrite_offset = [0, 2, 50, 3]

# quit
quit_title = "{n} task{s} running, sure to quit? (y/N)"
quit_origin = "top-center"
quit_offset = [0, 2, 50, 3]

[select]
open_title = "Open with:"
open_origin = "hovered"
open_offset = [0, 1, 50, 7]

[log]
enabled = false   # 日志
